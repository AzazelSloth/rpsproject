name: Deploy Backend Matsiatra Ticket

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    # verifier la valeur du GITHUB_REF_NAME

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Build Number
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 10m
          envs: GITHUB_REF_NAME,BUILD_NUMBER
          script: |
            set -e

            TARGET_BRANCH="$GITHUB_REF_NAME"

            if [ "$TARGET_BRANCH" = "dev" ]; then
              ENV=development
              APP_DIR=~/matsiatra-ticket-backend-dev
              IMAGE_NAME=matsiatra-ticket-backend-dev:"${BUILD_NUMBER}"
              CONTAINER_NAME=matsiatra-ticket-backend-dev
              POSTGRES_DB=ticketdev
              MINIO_BUCKET=ticketdev
              PORT=4889
              GIT_BRANCH=dev
              FRONTEND_URL=https://dev.ti-ket.mg
            else
              ENV=production
              APP_DIR=~/matsiatra-ticket-backend
              IMAGE_NAME=matsiatra-ticket-backend:"${BUILD_NUMBER}"
              CONTAINER_NAME=matsiatra-ticket-backend
              POSTGRES_DB=ticket
              MINIO_BUCKET=ticket
              PORT=4888
              GIT_BRANCH=main
              FRONTEND_URL=https://www.ti-ket.mg
            fi

            echo "🚀 Déploiement BACKEND – $ENV"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d .git ]; then
              git fetch origin "$GIT_BRANCH"
              git reset --hard "origin/$GIT_BRANCH"
            else
              git clone -b "$GIT_BRANCH" git@github.com:Projet-Ticket/backend.git .
            fi

            echo "🐳 Build image Docker"
            docker build -t "$IMAGE_NAME" .

            echo "🛑 Arrêt ancien conteneur"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            echo "▶️ Lancement nouveau conteneur"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$PORT:$PORT" \
              -e PORT="$PORT" \
              -e ENV="$ENV" \
              -e POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
              -e POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}" \
              -e POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
              -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              -e POSTGRES_DB="$POSTGRES_DB" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRES="${{ secrets.JWT_EXPIRES }}" \
              -e MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}" \
              -e MINIO_PORT="${{ secrets.MINIO_PORT }}" \
              -e MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
              -e MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
              -e MINIO_BUCKET="$MINIO_BUCKET" \
              -e MINIO_SSL="${{ secrets.MINIO_SSL }}" \
              -e CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              -e MAIL_DEST="${{ secrets.MAIL_DEST }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e FRONTEND_URL="$FRONTEND_URL" \
              "$IMAGE_NAME"

            echo "🧹 Nettoyage images inutiles"
            docker image prune -f

            echo "✅ Déploiement $ENV terminé"
