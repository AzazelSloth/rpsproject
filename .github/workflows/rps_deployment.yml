name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-backend/rps-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-frontend/nextjs-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Build Number
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 10m
          envs: GITHUB_REF_NAME,BUILD_NUMBER
          script: |
            set -e

            # Source scripts from scripts/ folder
            for script in ~/prod/scripts/*.sh; do
              [ -f "$script" ] && source "$script"
            done

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"

            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=development
              APP_DIR=~/prod
              GIT_BRANCH=main
            else
              ENV=production
              APP_DIR=~/prod
              GIT_BRANCH=deploy
            fi

            echo "🚀 Déploiement RPS – $ENV"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d .git ]; then
              git fetch origin "$GIT_BRANCH"
              git reset --hard "origin/$GIT_BRANCH"
            else
              git clone -b "$GIT_BRANCH" git@github.com:${{ github.repository }}.git .
            fi

            echo "🔧 Configuration des variables d'environnement"
            
            # Backend .env configuration
            cd "$APP_DIR/rps-backend/rps-backend"
            echo "NODE_ENV=$ENV" > .env
            echo "PORT=3000" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_SYNCHRONIZE=false" >> .env
            echo "DB_LOGGING=false" >> .env
            echo "✅ Backend .env configured"

            # Frontend .env.local configuration
            cd "$APP_DIR/rps-frontend/nextjs-app"
            echo "NEXT_PUBLIC_API_URL=http://127.0.0.1:3000" > .env.local
            echo "API_URL=http://127.0.0.1:3000" >> .env.local
            echo "NEXT_PUBLIC_STRAPI_URL=" >> .env.local
            echo "STRAPI_API_TOKEN=" >> .env.local
            echo "✅ Frontend .env.local configured"

            echo "🔧 Exécution du script de déploiement"
            cd "$APP_DIR"
            chmod +x scripts/vps/deploy.sh
            ./scripts/vps/deploy.sh "$TARGET_BRANCH" "$ENV"

            echo "✅ Déploiement $ENV terminé"