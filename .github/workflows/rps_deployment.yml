name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-backend/rps-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-frontend/nextjs-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Build Number
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 10m
          envs: GITHUB_REF_NAME,BUILD_NUMBER
          script: |
            set -e

            # Setup SSH for GitHub using existing id_deploy key
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            
            # Ensure proper permissions on existing keys
            chmod 600 ~/.ssh/id_deploy 2>/dev/null || true
            chmod 600 ~/.ssh/id_ed25519 2>/dev/null || true
            
            # Add GitHub to known hosts
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            chmod 644 ~/.ssh/known_hosts
            
            # Configure Git to use id_deploy key
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no"
            
            # Test SSH connection to GitHub
            ssh -T git@github.com 2>&1 || true

            # Debug: Show SSH config and key details
            echo "=== SSH Debug Info ==="
            ls -la ~/.ssh/
            echo "--- Testing with explicit key ---"
            ssh -v -i ~/.ssh/id_deploy -T git@github.com 2>&1 || true
            echo "--- Testing git fetch ---"
            GIT_SSH_COMMAND="ssh -v -i ~/.ssh/id_deploy" git fetch origin main 2>&1 || true
            echo "======================="

            # Source scripts from scripts/ folder
            for script in ~/prod/scripts/*.sh; do
              [ -f "$script" ] && source "$script"
            done

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"

            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=development
              APP_DIR=~/prod
              GIT_BRANCH=main
            else
              ENV=production
              APP_DIR=~/prod
              GIT_BRANCH=deploy
            fi

            echo "Deploying RPS - $ENV"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Use SSH to clone from GitHub
            export GIT_SSH_COMMAND="ssh -v -i ~/.ssh/id_deploy"
            if [ -d .git ]; then
              git remote set-url origin git@github.com:${{ github.repository }}.git
              git fetch -v origin "$GIT_BRANCH"
              git reset --hard "origin/$GIT_BRANCH"
            else
              git clone -v -b "$GIT_BRANCH" git@github.com:${{ github.repository }}.git .
            fi

            echo "Configuring environment variables"
            
            # Backend .env configuration
            cd "$APP_DIR/rps-backend/rps-backend"
            echo "NODE_ENV=$ENV" > .env
            echo "PORT=3000" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_SYNCHRONIZE=false" >> .env
            echo "DB_LOGGING=false" >> .env
            echo "Done: Backend .env configured"

            # Frontend .env.local configuration
            cd "$APP_DIR/rps-frontend/nextjs-app"
            echo "NEXT_PUBLIC_API_URL=http://127.0.0.1:3000" > .env.local
            echo "API_URL=http://127.0.0.1:3000" >> .env.local
            echo "NEXT_PUBLIC_STRAPI_URL=" >> .env.local
            echo "STRAPI_API_TOKEN=" >> .env.local
            echo "Done: Frontend .env.local configured"

            echo "Running deployment script"
            cd "$APP_DIR"
            chmod +x scripts/vps/deploy.sh
            ./scripts/vps/deploy.sh "$TARGET_BRANCH" "$ENV"

            echo "Done: Deployment $ENV completed"
