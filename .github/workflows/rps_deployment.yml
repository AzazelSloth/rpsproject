name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-backend/package-lock.json

      - name: Install dependencies
        working-directory: rps-backend
        run: npm ci

      - name: Run tests
        working-directory: rps-backend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: rps-backend
        run: npm run build

      - name: List build output
        working-directory: rps-backend
        run: ls -la dist/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-backend
          path: rps-backend/dist/
          retention-days: 7
          if-no-files-found: error

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: rps-frontend/nextjs-app
        run: npm ci

      - name: Build
        working-directory: rps-frontend/nextjs-app
        run: npm run build

      - name: List build output
        working-directory: rps-frontend/nextjs-app
        run: ls -la .next/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-frontend
          path: ${{ github.workspace }}/rps-frontend/nextjs-app/.next/
          include-hidden-files: true
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')
    environment: rps_dev

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-backend
          path: build/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-frontend
          path: frontend-artifact/

      - name: Transfer artifacts to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          source: "build/,frontend-artifact/"
          target: "/tmp/rps-deploy-${{ github.sha }}"
          strip_components: 0
          rm: false
          debug: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          envs: GITHUB_REF_NAME,GITHUB_SHA
          script: |
            set -e

            # ===============================================
            # RPS Deployment Script - Uses CI Artifacts
            # ===============================================
            # Deploys pre-built artifacts from CI via SCP
            # No building on VPS - guaranteed latest version
            # ===============================================

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
            COMMIT_SHA="${GITHUB_SHA}"

            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=rps_dev
            else
              ENV=development
            fi

            APP_DIR="$HOME/rps-$ENV"
            DEPLOY_TMP="/tmp/rps-deploy-${COMMIT_SHA}"

            echo "=== Starting deployment: $ENV ==="
            echo "Commit: $COMMIT_SHA"
            echo "Artifacts location: $DEPLOY_TMP"

            # Verify artifacts were transferred
            if [ ! -d "$DEPLOY_TMP/build" ] || [ ! -d "$DEPLOY_TMP/frontend-artifact" ]; then
              echo "ERROR: Artifacts not found at $DEPLOY_TMP"
              ls -la /tmp/rps-deploy-* 2>/dev/null || echo "No deploy dirs found"
              exit 1
            fi

            # Use correct Node.js version from NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/versions/node/v24.14.1/bin/node" ] && export PATH="$NVM_DIR/versions/node/v24.14.1/bin:$PATH"
            echo "Node version: $(node -v)"

            # ---------------------------------------------
            # Backup current deployment
            # ---------------------------------------------
            if [ -d "$APP_DIR" ]; then
              echo "Backing up current deployment..."
              mv "$APP_DIR" "${APP_DIR}.backup.$(date +%Y%m%d%H%M%S)" || true
            fi

            # Create application directories
            mkdir -p "$APP_DIR/rps-backend"
            mkdir -p "$APP_DIR/rps-frontend/nextjs-app"

            # ---------------------------------------------
            # Clone source code for package.json & config files
            # ---------------------------------------------
            echo "Cloning source code for package files..."
            TEMP_SOURCE="/tmp/rps-source-${COMMIT_SHA}"
            git clone --depth 1 -b "$TARGET_BRANCH" https://github.com/${{ github.repository }}.git "$TEMP_SOURCE"

            # Copy backend source files (package.json, tsconfig, src/, etc.)
            if [ -d "$TEMP_SOURCE/rps-backend" ]; then
              cp -r "$TEMP_SOURCE/rps-backend/"* "$APP_DIR/rps-backend/"
            else
              echo "ERROR: Backend source not found in clone"
              exit 1
            fi

            # Copy frontend source files (package.json, app/, etc.)
            if [ -d "$TEMP_SOURCE/rps-frontend/nextjs-app" ]; then
              cp -r "$TEMP_SOURCE/rps-frontend/nextjs-app/"* "$APP_DIR/rps-frontend/nextjs-app/"
            else
              echo "ERROR: Frontend source not found in clone"
              exit 1
            fi

            # Clean up source clone
            rm -rf "$TEMP_SOURCE"

            # ---------------------------------------------
            # Deploy CI-built artifacts (NO BUILD ON VPS)
            # ---------------------------------------------
            echo "Deploying backend artifact (pre-built in CI)..."

            # Replace dist/ with CI-built artifact
            rm -rf "$APP_DIR/rps-backend/dist"
            cp -r "$DEPLOY_TMP/build/" "$APP_DIR/rps-backend/dist/"

            # Detect backend entrypoint
            BACKEND_SCRIPT="$(find "$APP_DIR/rps-backend/dist" -type f -name main.js | head -n 1 || true)"
            if [ -z "$BACKEND_SCRIPT" ]; then
              echo "ERROR: no main.js found in dist/ after artifact deployment"
              echo "Contents of dist/:"
              ls -la "$APP_DIR/rps-backend/dist/" || echo "dist/ doesn't exist"
              exit 1
            fi
            echo "Backend entrypoint: $BACKEND_SCRIPT"

            echo "Deploying frontend artifact (pre-built in CI)..."

            # Replace .next/ with CI-built artifact
            rm -rf "$APP_DIR/rps-frontend/nextjs-app/.next"
            cp -r "$DEPLOY_TMP/frontend-artifact/" "$APP_DIR/rps-frontend/nextjs-app/.next/"

            # Verify deployment
            if [ ! -f "$APP_DIR/rps-backend/package.json" ]; then
              echo "ERROR: package.json missing after deployment"
              exit 1
            fi

            if [ ! -d "$APP_DIR/rps-backend/dist" ]; then
              echo "ERROR: dist/ missing after deployment"
              exit 1
            fi

            if [ ! -d "$APP_DIR/rps-frontend/nextjs-app/.next" ]; then
              echo "ERROR: .next/ missing after deployment"
              exit 1
            fi

            # Clean up transferred artifacts
            rm -rf "$DEPLOY_TMP"

            # ---------------------------------------------
            # Configure environment variables
            # ---------------------------------------------
            echo "Configuring environment..."

            cat > "$APP_DIR/rps-backend/.env" << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_SYNCHRONIZE=false
            DB_LOGGING=false
            SWAGGER_ENABLED=true
            SWAGGER_PATH=api-docs
            ENVEOF

            cat > "$APP_DIR/rps-frontend/nextjs-app/.env.local" << 'ENVEOF'
            NEXT_PUBLIC_API_URL=/api
            API_URL=/api
            NEXT_PUBLIC_STRAPI_URL=
            STRAPI_API_TOKEN=
            ENVEOF

            echo "Environment configured"

            # ---------------------------------------------
            # PM2 Process Management
            # ---------------------------------------------
            echo "Configuring PM2..."

            # Create PM2 ecosystem config
            cat > "$APP_DIR/ecosystem.config.cjs" << PM2EOF
            module.exports = {
              apps: [
                {
                  name: "rps-backend",
                  cwd: "$APP_DIR/rps-backend",
                  script: "$BACKEND_SCRIPT",
                  interpreter: "node",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3000,
                    PATH: "/root/.nvm/versions/node/v24.14.1/bin:/usr/local/bin:/usr/bin:/bin"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  listen_timeout: 10000
                },
                {
                  name: "rps-frontend",
                  cwd: "$APP_DIR/rps-frontend/nextjs-app",
                  script: "node_modules/next/dist/bin/next",
                  args: "start -p 3001",
                  interpreter: "node",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3001,
                    PATH: "/root/.nvm/versions/node/v24.14.1/bin:/usr/local/bin:/usr/bin:/bin"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  listen_timeout: 10000
                }
              ]
            };
            PM2EOF

            cd "$APP_DIR"

            # Check if PM2 is installed
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Installing PM2..."
              sudo npm install -g pm2
            fi

            # Stop existing processes to ensure clean start
            pm2 delete all 2>/dev/null || true

            # Start PM2 with new artifacts
            pm2 start ecosystem.config.cjs
            pm2 save

            # Enable PM2 startup on reboot
            sudo env PATH="$PATH" "$(command -v pm2)" startup systemd -u "$USER" --hp "$HOME" >/dev/null 2>&1 || true
            pm2 save

            # Show status
            pm2 status
            pm2 logs --lines 20 --nostream

            echo "=== Deployment completed: $ENV ==="
            echo "Commit deployed: $COMMIT_SHA"
            echo "Backend API: http://localhost:3000"
            echo "Frontend: http://localhost:3001"
