name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-backend/rps-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-backend
          path: dist/
          retention-days: 7

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-frontend/nextjs-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-frontend
          path: .next/
          retention-days: 7

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-backend
          path: build/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-frontend
          path: .next/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          envs: GITHUB_REF_NAME
          script: |
            set -e

            # ===============================================
            # RPS Deployment Script - Optimized for Tools
            # ===============================================
            # Available tools: Git, Node.js (LTS), npm, PM2, PostgreSQL, Nginx, Certbot, Docker
            # Not yet: n8n (coming later)
            # ===============================================

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
            
            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=development
            else
              ENV=production
            fi

            # Set up application directory
            APP_DIR="$HOME/rps-$ENV"
            mkdir -p "$APP_DIR"

            # Create backend directory structure
            mkdir -p "$APP_DIR/rps-backend/rps-backend"
            
            # Create frontend directory structure  
            mkdir -p "$APP_DIR/rps-frontend/nextjs-app"

            echo "=== Starting deployment: $ENV ==="

            # ---------------------------------------------
            # Backend deployment
            # ---------------------------------------------
            echo "Deploying backend..."
            
            # Copy backend files (from artifacts)
            cp -r build/* "$APP_DIR/rps-backend/rps-backend/" 2>/dev/null || true
            
            # Ensure package.json exists for PM2 (needed for start:prod script)
            if [ ! -f "$APP_DIR/rps-backend/rps-backend/package.json" ]; then
              # Clone just to get package.json if not in artifacts
              cd /tmp
              rm -rf rps-backend-temp
              git clone --depth 1 -b "$TARGET_BRANCH" https://github.com/${{ github.repository }}.git rps-backend-temp
              cp rps-backend-temp/rps-backend/rps-backend/package.json "$APP_DIR/rps-backend/rps-backend/"
              cp rps-backend-temp/rps-backend/rps-backend/package-lock.json "$APP_DIR/rps-backend/rps-backend/" 2>/dev/null || true
            fi

            cd "$APP_DIR/rps-backend/rps-backend"
            
            # Configure environment
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_SYNCHRONIZE=false
            DB_LOGGING=false
            ENVEOF

            # Install production dependencies
            npm ci --omit=dev --ignore-scripts

            echo "Backend deployed successfully"

            # ---------------------------------------------
            # Frontend deployment
            # ---------------------------------------------
            echo "Deploying frontend..."
            
            # Copy frontend files (from artifacts)
            cp -r .next "$APP_DIR/rps-frontend/nextjs-app/" 2>/dev/null || true
            
            # Ensure package.json exists for PM2
            if [ ! -f "$APP_DIR/rps-frontend/nextjs-app/package.json" ]; then
              cp /tmp/rps-backend-temp/rps-frontend/nextjs-app/package.json "$APP_DIR/rps-frontend/nextjs-app/" 2>/dev/null || true
              cp /tmp/rps-backend-temp/rps-frontend/nextjs-app/package-lock.json "$APP_DIR/rps-frontend/nextjs-app/" 2>/dev/null || true
            fi

            cd "$APP_DIR/rps-frontend/nextjs-app"

            # Configure environment
            cat > .env.local << 'ENVEOF'
            NEXT_PUBLIC_API_URL=http://127.0.0.1:3000
            API_URL=http://127.0.0.1:3000
            NEXT_PUBLIC_STRAPI_URL=
            STRAPI_API_TOKEN=
            ENVEOF

            # Install production dependencies
            npm ci --omit=dev --ignore-scripts

            echo "Frontend deployed successfully"

            # ---------------------------------------------
            # PM2 Process Management
            # ---------------------------------------------
            echo "Configuring PM2..."

            # Create PM2 ecosystem config
            cat > "$APP_DIR/ecosystem.config.cjs" << 'PM2EOF'
            module.exports = {
              apps: [
                {
                  name: "rps-backend",
                  cwd: "./rps-backend/rps-backend",
                  script: "dist/main.js",
                  interpreter: "none",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3000
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  wait_ready: true,
                  listen_timeout: 10000
                },
                {
                  name: "rps-frontend",
                  cwd: "./rps-frontend/nextjs-app",
                  script: "node_modules/next/dist/bin/next",
                  args: "start -p 3001",
                  interpreter: "none",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3001
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  wait_ready: true,
                  listen_timeout: 10000
                }
              ]
            };
            PM2EOF

            # Reload PM2 with new configuration
            cd "$APP_DIR"
            
            # Check if PM2 is installed
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Installing PM2..."
              sudo npm install -g pm2
            fi

            # Start or reload applications
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save

            # Show status
            pm2 status
            pm2 logs --lines 20 --nostream

            echo "=== Deployment completed: $ENV ==="
            echo "Backend API: http://localhost:3000"
            echo "Frontend: http://localhost:3001"
