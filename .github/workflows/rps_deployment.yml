name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-backend/package-lock.json

      - name: Install dependencies
        working-directory: rps-backend
        run: npm ci

      - name: Run tests
        working-directory: rps-backend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: rps-backend
        run: npm run build

      - name: List build output
        working-directory: rps-backend
        run: ls -la dist/

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: rps-frontend/nextjs-app
        run: npm ci

      - name: Build
        working-directory: rps-frontend/nextjs-app
        run: rm -rf .next && npm run build

      - name: List build output
        working-directory: rps-frontend/nextjs-app
        run: ls -la .next/

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'rps_dev' || 'development' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 20m
          envs: GITHUB_REF_NAME,GITHUB_SHA
          script: |
            set -euo pipefail

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
            TEMP_REPO_DIR="$(mktemp -d)"
            trap 'rm -rf "$TEMP_REPO_DIR"' EXIT

            export GITHUB_SHA="${GITHUB_SHA}"
            export REPO_URL="git@github.com:AzazelSloth/rpsproject.git"
            export VPS_HOST="${{ secrets.VPS_HOST }}"
            export DOMAIN_NAME="${{ vars.DOMAIN_NAME }}"
            export PUBLIC_BASE_URL="${{ vars.PUBLIC_BASE_URL }}"
            export N8N_RUNTIME_DIR="${{ vars.N8N_RUNTIME_DIR || '/srv/n8n' }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PORT="${{ secrets.DB_PORT }}"
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_TYPE="${{ vars.DB_TYPE || 'postgresdb' }}"
            export DB_SYNCHRONIZE="false"
            export DB_LOGGING="false"
            export ADMIN_ALLOWED_EMAILS="${{ secrets.ADMIN_ALLOWED_EMAILS }}"
            export ADMIN_BOOTSTRAP_EMAILS="${{ secrets.ADMIN_BOOTSTRAP_EMAILS }}"
            export ADMIN_BOOTSTRAP_PASSWORD="${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}"
            export ALLOWED_REGISTRATION_DOMAINS="${{ secrets.ALLOWED_REGISTRATION_DOMAINS }}"
            export SWAGGER_ENABLED="true"
            export SWAGGER_PATH="api-docs"
            export LOG_LEVEL="info"
            export N8N_BASIC_AUTH_ACTIVE="${{ secrets.N8N_BASIC_AUTH_ACTIVE }}"
            export N8N_BASIC_AUTH_USER="${{ secrets.N8N_BASIC_AUTH_USER }}"
            export N8N_BASIC_AUTH_PASSWORD="${{ secrets.N8N_BASIC_AUTH_PASSWORD }}"
            export N8N_ENCRYPTION_KEY="${{ secrets.N8N_ENCRYPTION_KEY }}"
            export N8N_USER_FOLDER="${{ secrets.N8N_USER_FOLDER || '/home/node/.n8n' }}"
            export N8N_HOST="${{ vars.N8N_HOST }}"
            export N8N_PORT="${{ secrets.N8N_PORT }}"
            export N8N_PROTOCOL="${{ vars.N8N_PROTOCOL }}"
            export N8N_SECURE_COOKIE="${{ secrets.N8N_SECURE_COOKIE }}"
            export N8N_PATH="${{ secrets.N8N_PATH }}"
            export N8N_EDITOR_BASE_URL="${{ vars.N8N_EDITOR_BASE_URL }}"
            export WEBHOOK_URL="${{ vars.WEBHOOK_URL }}"
            export N8N_LISTEN_ADDRESS="${{ secrets.N8N_LISTEN_ADDRESS }}"
            export N8N_WEBHOOK_PATH="${{ vars.N8N_WEBHOOK_PATH }}"
            export DB_NAME_N8N="${{ secrets.DB_NAME_N8N }}"
            export N8N_HEALTH_REQUIRED="false"
            export TZ="${{ vars.TZ || 'Indian/Antananarivo' }}"
            export GENERIC_TIMEZONE="${{ vars.GENERIC_TIMEZONE || 'Indian/Antananarivo' }}"
            export NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}"
            export NEXT_PUBLIC_APP_URL="${{ vars.NEXT_PUBLIC_APP_URL }}"
            export APP_URL="${{ vars.APP_URL }}"
            export APP_DOMAIN="${{ vars.APP_DOMAIN }}"
            export N8N_DOMAIN="${{ vars.N8N_DOMAIN }}"
            export BACKEND_API_URL="${{ vars.BACKEND_API_URL || 'http://host.docker.internal:3000' }}"
            export API_KEY="${{ secrets.API_KEY }}"
            export SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}"
            export SENDGRID_FROM_EMAIL="${{ vars.SENDGRID_FROM_EMAIL }}"
            export SENDGRID_FROM_NAME="${{ vars.SENDGRID_FROM_NAME }}"
            export SENDGRID_REPLY_TO="${{ vars.SENDGRID_REPLY_TO }}"
            export REPORT_RECIPIENT_EMAIL="${{ vars.REPORT_RECIPIENT_EMAIL }}"
            export GOOGLE_DRIVE_FOLDER="${{ vars.GOOGLE_DRIVE_FOLDER }}"
            export REMINDER_CAMPAIGN_IDS="${{ vars.REMINDER_CAMPAIGN_IDS }}"
            export REMINDER_MIN_DAYS="${{ vars.REMINDER_MIN_DAYS || '6' }}"
            export REMINDER_MAX_COUNT="${{ vars.REMINDER_MAX_COUNT || '2' }}"

            git clone --depth 1 -b "$TARGET_BRANCH" "$REPO_URL" "$TEMP_REPO_DIR"
            bash "$TEMP_REPO_DIR/scripts/vps/deploy.sh" "$TARGET_BRANCH"
