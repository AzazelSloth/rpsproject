name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-backend/rps-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-frontend/nextjs-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/deploy'
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Validate required deployment secrets
        run: |
          test -n "$VPS_HOST" || (echo "Missing secret: VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "Missing secret: VPS_USER" && exit 1)
          test -n "$VPS_APP_DIR" || (echo "Missing secret: VPS_APP_DIR" && exit 1)

      - name: Deploy over SSH with project script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: VPS_APP_DIR,VPS_BRANCH
          script: |
            set -euo pipefail
            cd "$VPS_APP_DIR"
            chmod +x scripts/vps/deploy.sh
            ./scripts/vps/deploy.sh "$VPS_BRANCH"

      - name: Deployment summary
        run: |
          echo "Deployment to VPS completed."
          echo "Host: $VPS_HOST"
          echo "Project path: $VPS_APP_DIR"
          echo "Branch: $VPS_BRANCH"