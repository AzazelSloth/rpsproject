name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-backend/rps-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rps-frontend/nextjs-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'development' || 'production' }}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_APP_DIR_DEV: ${{ secrets.VPS_APP_DIR_DEV }}
      VPS_APP_DIR_PROD: ${{ secrets.VPS_APP_DIR_PROD }}
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Set Build Number
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST" || (echo "❌ Missing secret: VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "❌ Missing secret: VPS_USER" && exit 1)
          test -n "$VPS_SSH_PRIVATE_KEY" || (echo "❌ Missing secret: VPS_SSH_PRIVATE_KEY" && exit 1)
          test -n "$VPS_APP_DIR_DEV" || (echo "❌ Missing secret: VPS_APP_DIR_DEV" && exit 1)
          test -n "$VPS_APP_DIR_PROD" || (echo "❌ Missing secret: VPS_APP_DIR_PROD" && exit 1)
          echo "✅ All required secrets validated"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_PRIVATE_KEY }}
          port: ${{ env.VPS_PORT || '22' }}
          timeout: 300s
          command_timeout: 10m
          script_stop: true
          envs: TARGET_BRANCH,BUILD_NUMBER,VPS_APP_DIR_DEV,VPS_APP_DIR_PROD
          script: |
            set -e

            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=development
              APP_DIR="$VPS_APP_DIR_DEV"
              DEPLOY_BRANCH=main
            else
              ENV=production
              APP_DIR="$VPS_APP_DIR_PROD"
              DEPLOY_BRANCH=deploy
            fi

            echo "🚀 Déploiement RPS - $ENV"
            echo "Build #$BUILD_NUMBER"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d .git ]; then
              echo "📥 Mise à jour du repository ($DEPLOY_BRANCH)"
              git fetch origin "$DEPLOY_BRANCH"
              git reset --hard "origin/$DEPLOY_BRANCH"
            else
              echo "📥 Clone du repository ($DEPLOY_BRANCH)"
              git clone -b "$DEPLOY_BRANCH" "git@github.com:${{ github.repository }}.git" .
            fi

            echo "🔧 Exécution du script de déploiement"
            chmod +x scripts/vps/deploy.sh
            ./scripts/vps/deploy.sh "$DEPLOY_BRANCH"

            echo "✅ Déploiement $ENV terminé"

      - name: Deployment summary
        run: |
          echo "📋 Résumé du déploiement:"
          echo "  • Environnement: ${{ github.ref_name == 'main' && 'development' || 'production' }}"
          echo "  • Branche: ${{ github.ref_name }}"
          echo "  • Build: $BUILD_NUMBER"
          echo "  • Serveur: ${{ env.VPS_HOST }}"
          echo "  • Répertoire DEV: ${{ env.VPS_APP_DIR_DEV }}"
          echo "  • Répertoire PROD: ${{ env.VPS_APP_DIR_PROD }}"