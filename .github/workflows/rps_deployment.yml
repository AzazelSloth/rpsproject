name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-backend/package-lock.json

      - name: Install dependencies
        working-directory: rps-backend
        run: npm ci

      - name: Run tests
        working-directory: rps-backend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: rps-backend
        run: npm run build

      - name: List build output
        working-directory: rps-backend
        run: ls -la dist/

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: rps-frontend/nextjs-app
        run: npm ci

      - name: Build
        working-directory: rps-frontend/nextjs-app
        run: npm run build

      - name: List build output
        working-directory: rps-frontend/nextjs-app
        run: ls -la .next/

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')
    environment: rps_dev

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          envs: GITHUB_REF_NAME,GITHUB_SHA
          script: |
            set -e

            # ===============================================
            # RPS Deployment Script - Uses Git + npm + PM2
            # ===============================================
            # Tools used: Git, Node.js, npm, PM2
            # No SCP, no artifacts download
            # ===============================================

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
            COMMIT_SHA="${GITHUB_SHA}"

            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=rps_dev
            else
              ENV=development
            fi

            APP_DIR="$HOME/rps-$ENV"

            echo "=== Starting deployment: $ENV ==="
            echo "Branch: $TARGET_BRANCH"
            echo "Commit: $COMMIT_SHA"

            # Load Node.js from NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/versions/node/v24.14.1/bin/node" ] && export PATH="$NVM_DIR/versions/node/v24.14.1/bin:$PATH"
            echo "Node version: $(node -v)"
            echo "npm version: $(npm -v)"

            # ---------------------------------------------
            # Clone/Pull latest code from Git
            # ---------------------------------------------
            echo "Fetching latest code from Git..."

            # Backup current deployment
            if [ -d "$APP_DIR" ]; then
              echo "Backing up current deployment..."
              mv "$APP_DIR" "${APP_DIR}.backup.$(date +%Y%m%d%H%M%S)" || true
            fi

            mkdir -p "$APP_DIR"

            # Fresh clone to guarantee latest code
            git clone --depth 1 -b "$TARGET_BRANCH" https://github.com/${{ github.repository }}.git "$APP_DIR"

            if [ ! -f "$APP_DIR/rps-backend/package.json" ]; then
              echo "ERROR: rps-backend/package.json not found"
              exit 1
            fi

            if [ ! -f "$APP_DIR/rps-frontend/nextjs-app/package.json" ]; then
              echo "ERROR: rps-frontend/nextjs-app/package.json not found"
              exit 1
            fi

            echo "Git repository cloned successfully"

            # ---------------------------------------------
            # Backend: Install + Build
            # ---------------------------------------------
            echo "Building backend..."

            cd "$APP_DIR/rps-backend"

            # Install ALL dependencies (dev deps needed for build)
            npm ci

            # Build backend
            npm run build

            # Detect backend entrypoint
            BACKEND_SCRIPT="$(find dist -type f -name main.js | head -n 1 || true)"
            if [ -z "$BACKEND_SCRIPT" ]; then
              echo "ERROR: no main.js found in dist/ after build"
              ls -la dist/ || echo "dist/ doesn't exist"
              exit 1
            fi
            echo "Backend entrypoint: $BACKEND_SCRIPT"

            # Configure backend environment
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_SYNCHRONIZE=false
            DB_LOGGING=false
            ADMIN_BOOTSTRAP_PASSWORD=${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
            SWAGGER_ENABLED=true
            SWAGGER_PATH=api-docs
            ENVEOF

            # Apply database migrations before starting services
            npm run migration:run

            echo "Backend built successfully"

            # ---------------------------------------------
            # Frontend: Install + Build
            # ---------------------------------------------
            echo "Building frontend..."

            cd "$APP_DIR/rps-frontend/nextjs-app"

            # Install ALL dependencies (dev deps needed for build)
            npm ci

            # Configure frontend environment BEFORE build so NEXT_PUBLIC_* variables are baked correctly
            cat > .env.local << 'ENVEOF'
            NEXT_PUBLIC_API_URL=/api
            API_URL=http://127.0.0.1:3000/api
            NEXT_PUBLIC_STRAPI_URL=
            STRAPI_API_TOKEN=
            ENVEOF

            # Build frontend
            npm run build

            # Verify .next was created
            if [ ! -d ".next" ]; then
              echo "ERROR: .next directory not found after build"
              ls -la . | head -20
              exit 1
            fi

            echo "Frontend built successfully"

            # ---------------------------------------------
            # PM2 Process Management
            # ---------------------------------------------
            echo "Configuring PM2..."

            # Create PM2 ecosystem config
            cat > "$APP_DIR/ecosystem.config.cjs" << PM2EOF
            module.exports = {
              apps: [
                {
                  name: "rps-backend",
                  cwd: "$APP_DIR/rps-backend",
                  script: "$BACKEND_SCRIPT",
                  interpreter: "node",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3000,
                    PATH: "$PATH"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  listen_timeout: 10000
                },
                {
                  name: "rps-frontend",
                  cwd: "$APP_DIR/rps-frontend/nextjs-app",
                  script: "node_modules/next/dist/bin/next",
                  args: "start -p 3001",
                  interpreter: "node",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3001,
                    PATH: "$PATH"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  listen_timeout: 10000
                }
              ]
            };
            PM2EOF

            cd "$APP_DIR"

            # Install PM2 if not present
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Installing PM2..."
              npm install -g pm2
            fi

            # Stop existing processes
            pm2 delete all 2>/dev/null || true

            # Start with new code
            pm2 start ecosystem.config.cjs
            pm2 save

            # Enable PM2 startup on reboot
            sudo env PATH="$PATH" "$(command -v pm2)" startup systemd -u "$USER" --hp "$HOME" >/dev/null 2>&1 || true
            pm2 save

            # Apply Nginx configuration from repository (optional, distro-dependent layout)
            if [ -f "$APP_DIR/scripts/vps/nginx.rps.conf" ] && command -v nginx >/dev/null 2>&1; then
              if [ -d /etc/nginx/sites-available ] && [ -d /etc/nginx/sites-enabled ]; then
                sudo cp "$APP_DIR/scripts/vps/nginx.rps.conf" /etc/nginx/sites-available/rps
                sudo ln -sf /etc/nginx/sites-available/rps /etc/nginx/sites-enabled/rps
                sudo nginx -t
                sudo systemctl reload nginx
              elif [ -d /etc/nginx/conf.d ]; then
                sudo cp "$APP_DIR/scripts/vps/nginx.rps.conf" /etc/nginx/conf.d/rps.conf
                sudo nginx -t
                sudo systemctl reload nginx
              else
                echo "WARN: nginx config directory not found; skipping nginx update."
              fi
            else
              echo "WARN: nginx not installed or nginx.rps.conf missing; skipping nginx update."
            fi

            # Show status
            pm2 status
            pm2 logs --lines 20 --nostream

            echo "=== Deployment completed: $ENV ==="
            echo "Commit deployed: $COMMIT_SHA"
            echo "Backend API: http://localhost:3000"
            echo "Frontend: http://localhost:3001"
