name: RPS CI/CD
run-name: "${{ github.actor }} triggered RPS CI/CD"

on:
  push:
    branches:
      - main
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rps-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-backend/rps-backend/package-lock.json

      - name: Install dependencies
        working-directory: rps-backend/rps-backend
        run: npm ci

      - name: Run tests
        working-directory: rps-backend/rps-backend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: rps-backend/rps-backend
        run: npm run build

      - name: List build output
        working-directory: rps-backend/rps-backend
        run: ls -la dist/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-backend
          path: rps-backend/rps-backend/dist/
          retention-days: 7
          if-no-files-found: error

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rps-frontend/nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: rps-frontend/nextjs-app
        run: npm ci

      - name: Build
        working-directory: rps-frontend/nextjs-app
        run: npm run build

      - name: List build output
        working-directory: rps-frontend/nextjs-app
        run: ls -la .next/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rps-frontend
          path: ${{ github.workspace }}/rps-frontend/nextjs-app/.next/
          include-hidden-files: true
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/deploy' || github.ref == 'refs/heads/main')
    environment: rps_dev

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-backend
          path: build/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: rps-frontend
          path: frontend-artifact/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          envs: GITHUB_REF_NAME
          script: |
            set -e

            # ===============================================
            # RPS Deployment Script - Optimized for Tools
            # ===============================================
            # Available tools: Git, Node.js (LTS), npm, PM2, PostgreSQL, Nginx, Certbot, Docker
            # Not yet: n8n (coming later)
            # ===============================================

            TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
            
            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV=rps_dev
            else
              ENV=development
            fi

            # Set up application directory
            APP_DIR="$HOME/rps-$ENV"
            mkdir -p "$APP_DIR"

            # Create backend directory structure
            mkdir -p "$APP_DIR/rps-backend/rps-backend"
            
            # Create frontend directory structure  
            mkdir -p "$APP_DIR/rps-frontend/nextjs-app"

            echo "=== Starting deployment: $ENV ==="

            # Use correct Node.js version from NVM (before builds!)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/versions/node/v24.14.1/bin/node" ] && export PATH="$NVM_DIR/versions/node/v24.14.1/bin:$PATH"
            echo "Node version: $(node -v)"

            # ---------------------------------------------
            # Backend deployment
            # ---------------------------------------------
            echo "Deploying backend..."
            
            # Clone the repo to get backend files
            cd /tmp
            rm -rf rps-backend-temp
            git clone --depth 1 -b "$TARGET_BRANCH" https://github.com/${{ github.repository }}.git rps-backend-temp
            
            # Copy backend files (src, package.json, etc.)
            cp -r rps-backend-temp/rps-backend/rps-backend/* "$APP_DIR/rps-backend/rps-backend/" 2>/dev/null || true
            
            cd "$APP_DIR/rps-backend/rps-backend"
            
            # Install ALL dependencies (dev dependencies needed for build)
            npm ci
            
            # Build the backend
            npm run build
            
            # Configure environment
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_SYNCHRONIZE=false
            DB_LOGGING=false
            ENVEOF

            echo "Backend deployed successfully"

            # ---------------------------------------------
            # Frontend deployment
            # ---------------------------------------------
            echo "Deploying frontend..."
            
            # Clone the repo to get frontend files
            cd /tmp
            rm -rf rps-frontend-temp
            git clone --depth 1 -b "$TARGET_BRANCH" https://github.com/${{ github.repository }}.git rps-frontend-temp
            
            # Copy frontend files (package.json, etc.)
            cp -r rps-frontend-temp/rps-frontend/nextjs-app/* "$APP_DIR/rps-frontend/nextjs-app/" 2>/dev/null || true
            
            cd "$APP_DIR/rps-frontend/nextjs-app"
            
            # Install ALL dependencies (dev dependencies needed for build)
            npm ci
            
            # Build the frontend
            npm run build

            # Configure environment
            cat > .env.local << 'ENVEOF'
            NEXT_PUBLIC_API_URL=http://127.0.0.1:3000
            API_URL=http://127.0.0.1:3000
            NEXT_PUBLIC_STRAPI_URL=
            STRAPI_API_TOKEN=
            ENVEOF

            echo "Frontend deployed successfully"

            # ---------------------------------------------
            # PM2 Process Management
            # ---------------------------------------------
            echo "Configuring PM2..."

            # Create PM2 ecosystem config
            cat > "$APP_DIR/ecosystem.config.cjs" << 'PM2EOF'
            module.exports = {
              apps: [
                {
                  name: "rps-backend",
                  cwd: "./rps-backend/rps-backend",
                  script: "dist/main.js",
                  interpreter: "none",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3000,
                    PATH: "/root/.nvm/versions/node/v24.14.1/bin:/usr/local/bin:/usr/bin:/bin"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  wait_ready: true,
                  listen_timeout: 10000
                },
                {
                  name: "rps-frontend",
                  cwd: "./rps-frontend/nextjs-app",
                  script: "node_modules/next/dist/bin/next",
                  args: "start -p 3001",
                  interpreter: "none",
                  env: {
                    NODE_ENV: "production",
                    PORT: 3001,
                    PATH: "/root/.nvm/versions/node/v24.14.1/bin:/usr/local/bin:/usr/bin:/bin"
                  },
                  instances: 1,
                  exec_mode: "fork",
                  watch: false,
                  max_memory_restart: "500M",
                  autorestart: true,
                  max_restarts: 10,
                  min_uptime: "10s",
                  kill_timeout: 5000,
                  wait_ready: true,
                  listen_timeout: 10000
                }
              ]
            };
            PM2EOF

            # Reload PM2 with new configuration
            cd "$APP_DIR"
            
            # Use correct Node.js version from NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/versions/node/v24.14.1/bin/node" ] && export PATH="$NVM_DIR/versions/node/v24.14.1/bin:$PATH"

            echo "Node version: $(node -v)"

            # Check if PM2 is installed
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Installing PM2..."
              sudo npm install -g pm2
            fi

            # Stop existing processes to ensure clean start
            pm2 delete all 2>/dev/null || true
            
            # Start PM2
            pm2 start ecosystem.config.cjs
            pm2 save

            # Show status
            pm2 status
            pm2 logs --lines 20 --nostream

            echo "=== Deployment completed: $ENV ==="
            echo "Backend API: http://localhost:3000"
            echo "Frontend: http://localhost:3001"
