services:
  backend:
    build:
      context: ../../rps-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-rps_user}
      DB_PASSWORD: ${DB_PASSWORD:-rps_pass}
      DB_NAME: ${DB_NAME:-rps_db}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-}
      ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ALLOWED_REGISTRATION_DOMAINS: ${ALLOWED_REGISTRATION_DOMAINS:-localhost.local}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_PATH: ${SWAGGER_PATH:-api-docs}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_URL: ${APP_URL:-http://localhost}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-communications@laroche360.ca}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Laroche 360}
      SENDGRID_REPLY_TO: ${SENDGRID_REPLY_TO:-communications@laroche360.ca}
      API_KEY: ${API_KEY:-}

      # n8n internal access
      N8N_BASE_URL: ${N8N_BASE_URL:-http://host.docker.internal:5678/n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678/n8n}
      N8N_WEBHOOK_PATH: ${N8N_WEBHOOK_PATH:-/webhook/sondage-rps-solutions-tech}
      N8N_HEALTH_REQUIRED: ${N8N_HEALTH_REQUIRED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rps_network

  frontend:
    build:
      context: ../../rps-frontend/nextjs-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
      API_URL: http://backend:3000/api
      APP_URL: ${APP_URL:-http://localhost}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://host.docker.internal:5678/n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678/n8n}
      N8N_WEBHOOK_PATH: ${N8N_WEBHOOK_PATH:-/webhook/sondage-rps-solutions-tech}
    depends_on:
      - backend
    volumes:
      - frontend_cache:/app/.next/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rps_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-appli.laroche360.ca}
      N8N_DOMAIN: ${N8N_DOMAIN:-automation.laroche360.ca}
    ports:
      - "8787:8786"
    volumes:
      - ./nginx.rps.conf:/etc/nginx/templates/default.conf.template:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rps_network

networks:
  rps_network:
    driver: bridge

volumes:
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  frontend_cache:
    driver: local
