services:
  n8n:
    image: ${N8N_IMAGE:-}
    restart: unless-stopped
    mem_limit: ${N8N_MEMORY_LIMIT:?N8N_MEMORY_LIMIT must be set by the deployment workflow}
    mem_reservation: ${N8N_MEMORY_RESERVATION:?N8N_MEMORY_RESERVATION must be set by the deployment workflow}
    cpus: ${N8N_CPU_LIMIT:?N8N_CPU_LIMIT must be set by the deployment workflow}
    pids_limit: ${N8N_PIDS_LIMIT:?N8N_PIDS_LIMIT must be set by the deployment workflow}
    environment:
      NODE_OPTIONS: ${N8N_NODE_OPTIONS:?N8N_NODE_OPTIONS must be set by the deployment workflow}
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - .env
    volumes:
      - ./data:${N8N_USER_FOLDER:-/home/node/.n8n}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: ${APP_COMPOSE_PROJECT_NAME:-rps-rps_dev}_rps_network
