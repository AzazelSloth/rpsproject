# ==============================================================================
# RPS Platform - Nginx Configuration
# ==============================================================================
# Access: http://YOUR_VPS_IP (port 80)
# Frontend: http://YOUR_VPS_IP/
# API Backend: http://YOUR_VPS_IP/api/*
#
# For HTTPS with Certbot:
#   sudo certbot --nginx -d your-domain.com
# ==============================================================================
# ==============================================================================
# RPS Platform - Consolidated Nginx Configuration (Complete & Production-Ready)
# ==============================================================================
#
# PURPOSE: Single, comprehensive configuration for RPS platform (frontend + API)
# HTTP Access: http://YOUR_VPS_IP/ (redirects to HTTPS if enabled)
# API Access: http://YOUR_VPS_IP/api/*
#
# QUICK START:
#   1. Copy to VPS: scp scripts/vps/nginx.rps.conf root@VPS_IP:/etc/nginx/sites-available/rps.conf
#   2. Enable: ssh VPS_IP "sudo ln -sf /etc/nginx/sites-available/rps.conf /etc/nginx/sites-enabled/"
#   3. Test: ssh VPS_IP "sudo nginx -t"
#   4. Reload: ssh VPS_IP "sudo systemctl reload nginx"
#
# HTTPS SETUP (Optional - Uncomment section below):
#   1. Install: sudo apt install certbot python3-certbot-nginx
#   2. Get cert: sudo certbot certonly --standalone -d your-domain.com
#   3. Uncomment HTTPS server block below
#   4. Update domain & certificate paths
#   5. Test & reload Nginx
#
# ARCHITECTURE:
#   - Backend (NestJS): http://127.0.0.1:3000 (proxied as /api/*)
#   - Frontend (Next.js): http://127.0.0.1:3001 (proxied as /*)
#   - Health check: /health → /api/health on backend
#   - Static assets cached: /_next/static/, *.jpg, *.css, *.js, etc.
#
# SECURITY: Includes headers for XSS, clickjacking, MIME type protection
# HTTPS: Full TLS 1.2/1.3 with OCSP stapling (when enabled)
# ==============================================================================
}

# HTTP server (redirects to HTTPS when SSL is enabled)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Let's Encrypt ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Redirect all HTTP to HTTPS (uncomment when SSL is enabled)
    # return 301 https://$server_name$request_uri;

    # Frontend (Next.js)
    location / {
        proxy_pass http://rps_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # API Backend (NestJS)
    location /api/ {
        proxy_pass http://rps_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://rps_backend/api;
            proxy_pass http://rps_backend;
    }

    # Static files caching (Next.js)
    location /_next/static/ {
        proxy_pass http://rps_frontend;
        proxy_cache_valid 30d;
        add_header Cache-Control "public, immutable";
        expires 30d;
        access_log off;
    }

    # Client files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://rps_frontend;
        proxy_cache_valid 7d;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # Log files
    access_log /var/log/nginx/rps_access.log;
    error_log /var/log/nginx/rps_error.log warn;
}

