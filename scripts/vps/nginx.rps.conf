# RPS Platform - Nginx Configuration
# Access: http://YOUR_VPS_IP (port 80)
# Frontend: http://YOUR_VPS_IP/
# API Backend: http://YOUR_VPS_IP/api/*

upstream rps_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream rps_frontend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;

    # Frontend (Next.js)
    location / {
        proxy_pass http://rps_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
    }

    # API Backend (NestJS)
    location /api/ {
        proxy_pass http://rps_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (backend lives on port 3000)
    location /health {
        proxy_pass http://rps_backend/;
        access_log off;
    }

    # Static files caching (Next.js optimal)
    location /_next/static/ {
        proxy_pass http://rps_frontend;
        proxy_cache_valid 30d;
        add_header Cache-Control "public, immutable";
        expires 30d;
    }

    # Client files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://rps_frontend;
        proxy_cache_valid 7d;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # Log files
    access_log /var/log/nginx/rps_access.log;
    error_log /var/log/nginx/rps_error.log warn;
}
