map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream rps_backend {
  server backend:3000;
  keepalive 32;
}

upstream rps_frontend {
  server frontend:3001;
  keepalive 32;
}

upstream rps_n8n {
  server n8n:5678;
  keepalive 16;
}

server {
  listen 8786;
  listen [::]:8786;
  server_name ${APP_DOMAIN} _;

  server_name_in_redirect off;
  port_in_redirect off;
  absolute_redirect off;
  client_max_body_size 20m;

  location = /n8n {
    return 302 https://${N8N_DOMAIN}/;
  }

  location ^~ /n8n/ {
    rewrite ^/n8n/?(.*)$ /$1 break;
    return 302 https://${N8N_DOMAIN}$uri$is_args$args;
  }

  location ^~ /api-docs {
    proxy_pass http://rps_backend/api-docs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location /api-docs-json {
    proxy_pass http://rps_backend/api-docs-json;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location /api/trpc/ {
    proxy_pass http://rps_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }

  location = /api/auth/temporary-access {
    proxy_pass http://rps_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location ^~ /api/ {
    proxy_pass http://rps_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location /health {
    proxy_pass http://rps_backend/health;
    access_log off;
  }

  location /_next/static/ {
    proxy_pass http://rps_frontend;
    add_header Cache-Control "public, immutable";
    expires 30d;
    access_log off;
  }

  location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://rps_frontend;
    add_header Cache-Control "public, max-age=604800";
    expires 7d;
    access_log off;
  }

  location / {
    proxy_pass http://rps_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }
}

server {
  listen 8786;
  listen [::]:8786;
  server_name ${N8N_DOMAIN};

  server_name_in_redirect off;
  port_in_redirect off;
  absolute_redirect off;
  client_max_body_size 20m;

  location = / {
    proxy_pass http://rps_n8n;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }

  location = /n8n {
    return 301 /;
  }

  location ^~ /n8n/ {
    rewrite ^/n8n/?(.*)$ /$1 break;
    proxy_pass http://rps_n8n;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }

  location / {
    proxy_pass http://rps_n8n;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}
