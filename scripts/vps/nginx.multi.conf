# ==============================================================================
# RPS Platform - Nginx Multi-Project Configuration
# ==============================================================================
# Ce fichier est un TEMPLATE pour configurer plusieurs projets sur un VPS.
#
# UTILISATION:
# 1. Copier ce fichier vers /etc/nginx/sites-available/projet-name.conf
# 2. Adapter les variables (DOMAIN, PORT, etc.)
# 3. Activer: sudo ln -s /etc/nginx/sites-available/projet-name.conf /etc/nginx/sites-enabled/
# 4. Tester: sudo nginx -t
# 5. Recharger: sudo systemctl reload nginx
# ==============================================================================

# --------------------------------------------------------------------------
# Configuration pour RPS (exemple)
# --------------------------------------------------------------------------
# Remplacer:
#   - DOMAIN par votre domaine (ex: rps.mondomaine.com)
#   - BACKEND_PORT par le port du backend (ex: 3000)
#   - FRONTEND_PORT par le port du frontend (ex: 3001)
# --------------------------------------------------------------------------

# Upstream servers - Adapter les ports selon le projet
upstream rps_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rps_frontend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP (redirige vers HTTPS en production)
server {
    listen 80;
    listen [::]:80;
    server_name rps.mondomaine.com;  # REMPLACER par votre domaine

    # ACME challenge pour Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Sans SSL (développement) - rediriger vers le service
    location / {
        return 301 http://rps.mondomaine.com;
    }
}

